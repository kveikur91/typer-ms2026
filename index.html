<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ MŚ 2026 – Typer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1f2d45;
    --accent: #22d3a8;
    --accent2: #f59e0b;
    --red: #ef4444;
    --green: #22c55e;
    --text: #e2e8f0;
    --muted: #64748b;
    --gold: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #0a0f1e 0%, #0d1b35 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .header-title span { color: var(--accent); }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
    margin-left: auto;
  }

  .live-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--red);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  .container { max-width: 800px; margin: 0 auto; padding: 16px; }

  /* SECTION LABELS */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CURRENT MATCH CARD */
  .match-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .match-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .match-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .match-group {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .match-time-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .match-time-badge.live {
    color: var(--red);
    border-color: var(--red);
    animation: liveBlink 2s ease-in-out infinite;
  }

  @keyframes liveBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .match-scoreline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .team-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .team-flag {
    font-size: 36px;
    line-height: 1;
  }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .score-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .score-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 52px;
    line-height: 1;
    color: var(--text);
    letter-spacing: 2px;
  }

  .score-display.upcoming {
    font-size: 32px;
    color: var(--muted);
  }

  .score-minute {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--red);
  }

  /* TYPY TABLE */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .typy-table {
    width: 100%;
    border-collapse: collapse;
  }

  .typy-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .typy-table td {
    padding: 9px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .typy-table tr:last-child td { border-bottom: none; }

  .typy-table tr:hover td { background: rgba(255,255,255,0.02); }

  .player-name {
    font-weight: 600;
    color: var(--text);
  }

  .typ-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .x2-badge {
    display: inline-block;
    background: var(--accent2);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .result-icon {
    font-size: 16px;
    display: inline-block;
  }

  .pts-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .pts-4 { background: rgba(34,211,168,0.15); color: var(--accent); }
  .pts-3 { background: rgba(34,197,94,0.12); color: var(--green); }
  .pts-2 { background: rgba(251,191,36,0.12); color: var(--gold); }
  .pts-neg { background: rgba(239,68,68,0.12); color: var(--red); }
  .pts-0 { background: transparent; color: var(--muted); }

  /* TABELA LIVE */
  .leaderboard { list-style: none; }

  .leaderboard-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: transform 0.15s;
  }

  .leaderboard-row:hover { transform: translateX(2px); }

  .rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--muted);
    width: 30px;
    flex-shrink: 0;
  }

  .rank.r1 { color: var(--gold); }
  .rank.r2 { color: #94a3b8; }
  .rank.r3 { color: #cd7f32; }

  .lb-name {
    flex: 1;
    font-weight: 600;
    font-size: 14px;
  }

  .lb-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
  }

  .lb-pts-label {
    font-size: 10px;
    color: var(--muted);
    margin-left: 3px;
    font-weight: 500;
  }

  .lb-detail {
    font-size: 11px;
    color: var(--muted);
    margin-left: 10px;
    width: 80px;
    text-align: right;
  }

  /* UPCOMING MATCHES */
  .upcoming-list { display: flex; flex-direction: column; gap: 8px; }

  .upcoming-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }

  .upcoming-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent2);
    width: 55px;
    flex-shrink: 0;
  }

  .upcoming-teams {
    flex: 1;
    font-weight: 500;
  }

  .upcoming-group {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
  }

  /* NO MATCH STATE */
  .no-match-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    margin-bottom: 16px;
  }

  .no-match-emoji { font-size: 48px; margin-bottom: 10px; }

  .no-match-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .no-match-subtitle { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .loading {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--accent); }

  .last-update {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 8px;
  }

  .section-gap { margin-bottom: 24px; }

  /* Admin panel */
  .admin-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(34,211,168,0.3);
  }

  .admin-panel {
    position: fixed;
    bottom: 72px;
    right: 16px;
    width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-height: 80vh;
    overflow-y: auto;
  }

  .admin-panel.open { display: block; }

  .admin-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 14px;
    color: var(--accent);
  }

  .admin-group { margin-bottom: 12px; }

  .admin-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .admin-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }

  .admin-input:focus { outline: none; border-color: var(--accent); }

  .admin-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 9px;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 4px;
  }

  .admin-btn:hover { background: #1eb897; }

  .admin-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }

  .admin-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 10px;
    margin-bottom: 8px;
  }

  .flag { font-size: 18px; }
</style>
</head>

];

// =============================
// STATE
// =============================
let state = {
  players: ['Marek', 'Ania', 'Tomek', 'Kasia', 'Paweł', 'Zosia', 'Bartek', 'Ola'],
  // typy[matchId][player] = { home: number, away: number, x2: bool }
  typy: {},
  // wyniki[matchId] = { home: number, away: number, status: 'upcoming'|'live'|'ft', minute: number }
  wyniki: {},
  currentMatchId: null,
  lastUpdate: null,
};

// =============================
// LOAD / SAVE (localStorage)
// =============================
function loadState() {
  try {
    const s = localStorage.getItem('typer2026');
    if (s) {
      const parsed = JSON.parse(s);
      state.players = parsed.players || state.players;
      state.typy = parsed.typy || {};
      state.wyniki = parsed.wyniki || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('typer2026', JSON.stringify({
      players: state.players,
      typy: state.typy,
      wyniki: state.wyniki,
    }));
  } catch(e) {}
}

// =============================
// LIVE SCORES (football-data.org API – darmowe)
// =============================
async function fetchLiveScores() {
  try {
    // Używamy football-data.org (free tier, bez cors dla prostych requestów)
    // Fallback: przy CORS błędzie używamy allsports API proxy
    const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches?season=2026&matchday=1', {
      headers: { 'X-Auth-Token': 'PUBLIC' }
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    updateWynikiFromAPI(data.matches || []);
  } catch(e) {
    // Fallback do OpenLigaDB lub ręcznych wyników
    await fetchFromOpenLiga();
  }
  state.lastUpdate = new Date();
  saveState();
}

async function fetchFromOpenLiga() {
  try {
    // openligadb.de – publiczne API bez klucza
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch(`https://api.openligadb.de/getmatchdata/fifawm26/2026/1`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    updateWynikiFromOpenLiga(data);
  } catch(e) {
    // Milcząco fail – wyniki zostają ręczne
  }
}

function updateWynikiFromAPI(apiMatches) {
  apiMatches.forEach(m => {
    // dopasowanie po nazwach drużyn
    const match = findMatchByTeams(m.homeTeam?.shortName || m.homeTeam?.name, m.awayTeam?.shortName || m.awayTeam?.name);
    if (!match) return;
    const score = m.score?.fullTime || m.score?.regularTime;
    if (!score) return;
    state.wyniki[match.id] = {
      home: score.home ?? null,
      away: score.away ?? null,
      status: mapStatus(m.status),
      minute: m.minute || null,
    };
  });
}

function updateWynikiFromOpenLiga(data) {
  if (!Array.isArray(data)) return;
  data.forEach(m => {
    const ht = m.team1?.teamName || '';
    const at = m.team2?.teamName || '';
    const match = findMatchByTeams(ht, at);
    if (!match) return;
    if (m.matchResults?.length > 0) {
      const r = m.matchResults.find(r => r.resultTypeID === 2) || m.matchResults[0];
      state.wyniki[match.id] = {
        home: r.pointsTeam1,
        away: r.pointsTeam2,
        status: m.matchIsFinished ? 'ft' : (m.matchDateTimeUTC && new Date(m.matchDateTimeUTC) <= new Date() ? 'live' : 'upcoming'),
        minute: null,
      };
    }
  });
}

function findMatchByTeams(homeStr, awayStr) {
  if (!homeStr || !awayStr) return null;
  homeStr = homeStr.toLowerCase();
  awayStr = awayStr.toLowerCase();
  return MATCHES.find(m => {
    const h = m.home.toLowerCase();
    const a = m.away.toLowerCase();
    return (h.includes(homeStr.slice(0,4)) || homeStr.includes(h.slice(0,4))) &&
           (a.includes(awayStr.slice(0,4)) || awayStr.includes(a.slice(0,4)));
  });
}

function mapStatus(s) {
  if (!s) return 'upcoming';
  s = s.toUpperCase();
  if (s === 'FINISHED' || s === 'FULL_TIME') return 'ft';
  if (s === 'IN_PLAY' || s === 'PAUSED') return 'live';
  return 'upcoming';
}

// =============================
// LOGIKA PUNKTACJI
// =============================
function calcPoints(typ, wynik) {
  if (!wynik || wynik.home === null || wynik.away === null) return null;
  if (!typ) return null;
  const wH = wynik.home, wA = wynik.away;
  const tH = typ.home, tA = typ.away;
  let pts = 0;
  if (tH === wH && tA === wA) pts = 4;
  else if (tH - tA === wH - wA) pts = 3; // różnica bramek / remis
  else if ((tH > tA && wH > wA) || (tH < tA && wH < wA) || (tH === tA && wH === wA)) pts = 2; // zwycięzca
  else pts = -1;
  if (typ.x2) pts *= 2;
  return pts;
}

function getResultIcon(typ, wynik) {
  if (!wynik || wynik.home === null || wynik.away === null || !typ) return '';
  const pts = calcPoints(typ, wynik);
  if (pts === null) return '';
  if (pts === 4 || pts === 8) return '🟢🎉'; // idealny
  if (pts === 3 || pts === 6) return '🟢❕'; // różnica
  if (pts === 2 || pts === 4) return '🟢'; // zwycięzca
  return '🔴'; // błędny
}

function calcTotalPoints(player) {
  let total = 0;
  MATCHES.forEach(m => {
    const wynik = state.wyniki[m.id];
    const typ = (state.typy[m.id] || {})[player];
    const pts = calcPoints(typ, wynik);
    if (pts !== null) total += pts;
  });
  return total;
}

// =============================
// KTÓRY MECZ TERAZ / NAJBLIŻSZY
// =============================
function getCurrentOrNextMatch() {
  const now = new Date();
  let liveMatch = null;
  let nextMatch = null;
  let minDiff = Infinity;

  MATCHES.forEach(m => {
    const matchDate = new Date(`${m.date}T${m.time}:00`);
    const endDate = new Date(matchDate.getTime() + 110 * 60000);
    const wynik = state.wyniki[m.id];

    if (wynik?.status === 'live') { liveMatch = m; return; }
    if (wynik?.status === 'ft') return;

    // jeśli mecz powinien trwać (brak live info z API)
    if (now >= matchDate && now <= endDate) { liveMatch = m; return; }

    const diff = matchDate - now;
    if (diff > 0 && diff < minDiff) {
      minDiff = diff;
      nextMatch = m;
    }
  });

  return { liveMatch, nextMatch };
}

function getMatchesForToday() {
  const today = new Date().toISOString().split('T')[0];
  // "dziś" to też mecze do ~6 rano następnego dnia
  const todayParts = today.split('-');
  return MATCHES.filter(m => {
    if (m.date === today) return true;
    // mecze nocne z poprzedniego wieczoru
    const prev = new Date(today);
    prev.setDate(prev.getDate() - 1);
    const prevStr = prev.toISOString().split('T')[0];
    if (m.date === prevStr) {
      const h = parseInt(m.time.split(':')[0]);
      return h <= 6;
    }
    return false;
  });
}

function getUpcomingToday() {
  const now = new Date();
  return MATCHES.filter(m => {
    const dt = new Date(`${m.date}T${m.time}:00`);
    const wynik = state.wyniki[m.id];
    if (wynik?.status === 'ft') return false;
    return dt > now;
  }).slice(0, 5);
}

// =============================
// RENDER
// =============================
function render() {
  const { liveMatch, nextMatch } = getCurrentOrNextMatch();
  const activeMatch = liveMatch || nextMatch;
  const app = document.getElementById('app');

  let html = '';

  if (liveMatch) {
    html += renderCurrentMatch(liveMatch, true);
    html += renderTypy(liveMatch);
    html += renderLeaderboard();
    html += renderUpcoming(liveMatch);
  } else {
    html += renderNoMatch(nextMatch);
    html += renderLeaderboard();
  }

  app.innerHTML = html;
  renderAdminMatchSelect(activeMatch);
  renderAdminTypyForm(activeMatch);
}

function renderCurrentMatch(m, isLive) {
  const wynik = state.wyniki[m.id] || {};
  const hasScore = wynik.home !== null && wynik.away !== undefined;
  const status = wynik.status || (isLive ? 'live' : 'upcoming');
  const timeBadge = status === 'live'
    ? `<span class="match-time-badge live">⚫ LIVE ${wynik.minute ? wynik.minute + "'" : ''}</span>`
    : status === 'ft'
    ? `<span class="match-time-badge">FT</span>`
    : `<span class="match-time-badge">${m.time} CET</span>`;

  return `
  <div class="section-gap">
    <div class="section-label">AKTUALNY MECZ</div>
    <div class="match-hero">
      <div class="match-meta">
        <span class="match-group">GRUPA ${m.group} · ${m.venue}</span>
        ${timeBadge}
      </div>
      <div class="match-scoreline">
        <div class="team-block">
          <div class="team-flag">${m.homeFlag}</div>
          <div class="team-name">${m.home}</div>
        </div>
        <div class="score-block">
          <div class="score-display">${hasScore ? wynik.home + ' : ' + wynik.away : '- : -'}</div>
        </div>
        <div class="team-block">
          <div class="team-flag">${m.awayFlag}</div>
          <div class="team-name">${m.away}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderTypy(m) {
  const wynik = state.wyniki[m.id];
  const hasResult = wynik && wynik.home !== null && wynik.away !== null;

  const rows = state.players.map(p => {
    const typ = (state.typy[m.id] || {})[p];
    const pts = hasResult ? calcPoints(typ, wynik) : null;
    const icon = hasResult ? getResultIcon(typ, wynik) : '';

    let ptsHtml = '';
    if (pts !== null) {
      const cls = pts === 4 || pts === 8 ? 'pts-4' : pts === 3 || pts === 6 ? 'pts-3' : pts === 2 ? 'pts-2' : pts < 0 ? 'pts-neg' : 'pts-0';
      ptsHtml = `<span class="pts-badge ${cls}">${pts > 0 ? '+' : ''}${pts}</span>`;
    }

    const typStr = typ ? `${typ.home}:${typ.away}${typ.x2 ? '<span class="x2-badge">X2</span>' : ''}` : '—';

    return `<tr>
      <td><span class="player-name">${p}</span></td>
      <td><span class="typ-score">${typStr}</span></td>
      <td style="text-align:center">${icon ? `<span class="result-icon">${icon}</span>` : ''}</td>
      <td style="text-align:right">${ptsHtml}</td>
    </tr>`;
  }).join('');

  return `
  <div class="section-gap">
    <div class="section-label">TYPY</div>
    <div class="card">
      <table class="typy-table">
        <thead>
          <tr>
            <th>Gracz</th>
            <th>Typ</th>
            <th style="text-align:center">Status</th>
            <th style="text-align:right">Pkt</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderLeaderboard() {
  const scores = state.players.map(p => ({ name: p, pts: calcTotalPoints(p) }));
  scores.sort((a, b) => b.pts - a.pts);

  const rows = scores.map((s, i) => {
    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    return `<li class="leaderboard-row">
      <span class="rank ${rankClass}">${medal || (i + 1)}</span>
      <span class="lb-name">${s.name}</span>
      <span class="lb-pts">${s.pts}<span class="lb-pts-label">pkt</span></span>
    </li>`;
  }).join('');

  return `
  <div class="section-gap">
    <div class="section-label">TABELA LIVE</div>
    <ul class="leaderboard">${rows}</ul>
  </div>`;
}

function renderUpcoming(currentMatch) {
  const upcoming = MATCHES.filter(m => {
    if (m.id === currentMatch?.id) return false;
    const wynik = state.wyniki[m.id];
    if (wynik?.status === 'ft') return false;
    const dt = new Date(`${m.date}T${m.time}:00`);
    return dt > new Date();
  }).slice(0, 5);

  if (!upcoming.length) return '';

  const rows = upcoming.map(m => `
    <div class="upcoming-row">
      <span class="upcoming-time">${m.time}</span>
      <div style="flex:1">
        <div class="upcoming-teams">${m.homeFlag} ${m.home} vs ${m.away} ${m.awayFlag}</div>
        <div class="upcoming-group">Grupa ${m.group} · ${m.venue}</div>
      </div>
    </div>`).join('');

  return `
  <div class="section-gap">
    <div class="section-label">DZISIAJ JESZCZE</div>
    <div class="upcoming-list">${rows}</div>
  </div>`;
}

function renderNoMatch(nextMatch) {
  let heroHtml = '';
  if (nextMatch) {
    const dt = new Date(`${nextMatch.date}T${nextMatch.time}:00`);
    const dateStr = dt.toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' });
    heroHtml = `
    <div class="match-hero" style="text-align:center">
      <div class="match-group" style="margin-bottom:12px">GRUPA ${nextMatch.group} · ${nextMatch.venue}</div>
      <div class="match-scoreline">
        <div class="team-block">
          <div class="team-flag">${nextMatch.homeFlag}</div>
          <div class="team-name">${nextMatch.home}</div>
        </div>
        <div class="score-block">
          <div class="score-display upcoming">${nextMatch.time}</div>
          <div style="font-size:11px;color:var(--muted)">${dateStr}</div>
        </div>
        <div class="team-block">
          <div class="team-flag">${nextMatch.awayFlag}</div>
          <div class="team-name">${nextMatch.away}</div>
        </div>
      </div>
    </div>`;
  } else {
    heroHtml = `<div class="no-match-hero">
      <div class="no-match-emoji">🏆</div>
      <div class="no-match-title">BRAK ZAPLANOWANYCH MECZY</div>
      <div class="no-match-subtitle">Runda grupowa zakończona</div>
    </div>`;
  }

  return `
  <div class="section-gap">
    <div class="section-label">NAJBLIŻSZY MECZ</div>
    ${heroHtml}
  </div>`;
}

// =============================
// ADMIN PANEL
// =============================
function toggleAdmin() {
  document.getElementById('adminPanel').classList.toggle('open');
}

function renderAdminMatchSelect(activeMatch) {
  const sel = document.getElementById('adminMatchSelect');
  if (!sel) return;
  sel.innerHTML = MATCHES.map(m =>
    `<option value="${m.id}" ${activeMatch?.id === m.id ? 'selected' : ''}>${m.home} vs ${m.away} (${m.date.slice(5)})</option>`
  ).join('');
}

function onAdminMatchChange() {
  const sel = document.getElementById('adminMatchSelect');
  const m = MATCHES.find(x => x.id === sel.value);
  if (m) renderAdminTypyForm(m);
}

function renderAdminTypyForm(m) {
  const form = document.getElementById('adminTypyForm');
  if (!form || !m) return;

  const typy = state.typy[m.id] || {};
  const wynik = state.wyniki[m.id] || {};

  let html = `<div class="admin-label" style="margin-bottom:6px">Mecz: ${m.home} vs ${m.away}</div>`;

  // Wynik oficjalny
  html += `<div class="admin-label">Wynik (admin): <input style="width:40px" class="admin-input" id="wH" value="${wynik.home ?? ''}" placeholder="?"> : <input style="width:40px" class="admin-input" id="wA" value="${wynik.away ?? ''}" placeholder="?">
  <select class="admin-select" id="wStatus" style="width:auto;margin-left:6px">
    <option value="upcoming" ${wynik.status === 'upcoming' || !wynik.status ? 'selected' : ''}>Upcoming</option>
    <option value="live" ${wynik.status === 'live' ? 'selected' : ''}>Live</option>
    <option value="ft" ${wynik.status === 'ft' ? 'selected' : ''}>FT</option>
  </select>
  <button class="admin-btn" style="margin-top:4px" onclick="saveWynik('${m.id}')">Zapisz wynik</button>
  </div>`;

  // Typy graczy
  html += `<div class="admin-label" style="margin-top:10px">Typy graczy:</div>`;
  state.players.forEach(p => {
    const t = typy[p] || {};
    html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <span style="width:70px;font-size:12px;color:var(--text)">${p}</span>
      <input class="admin-input" id="t_${p}_h" value="${t.home ?? ''}" placeholder="D" style="width:38px">
      <span style="color:var(--muted)">:</span>
      <input class="admin-input" id="t_${p}_a" value="${t.away ?? ''}" placeholder="G" style="width:38px">
      <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px">
        <input type="checkbox" id="t_${p}_x2" ${t.x2 ? 'checked' : ''}> X2
      </label>
    </div>`;
  });

  html += `<button class="admin-btn" onclick="saveTypy('${m.id}')">💾 Zapisz typy</button>`;
  form.innerHTML = html;
}

function saveWynik(matchId) {
  const h = document.getElementById('wH')?.value;
  const a = document.getElementById('wA')?.value;
  const status = document.getElementById('wStatus')?.value || 'upcoming';
  state.wyniki[matchId] = {
    home: h !== '' ? parseInt(h) : null,
    away: a !== '' ? parseInt(a) : null,
    status,
    minute: null,
  };
  saveState();
  render();
}

function saveTypy(matchId) {
  if (!state.typy[matchId]) state.typy[matchId] = {};
  state.players.forEach(p => {
    const h = document.getElementById(`t_${p}_h`)?.value;
    const a = document.getElementById(`t_${p}_a`)?.value;
    const x2 = document.getElementById(`t_${p}_x2`)?.checked;
    if (h !== '' && a !== '') {
      state.typy[matchId][p] = { home: parseInt(h), away: parseInt(a), x2: !!x2 };
    }
  });
  saveState();
  render();
}

function addPlayer() {
  const name = document.getElementById('newPlayerName')?.value?.trim();
  if (!name || state.players.includes(name)) return;
  state.players.push(name);
  document.getElementById('newPlayerName').value = '';
  saveState();
  render();
  const m = MATCHES.find(x => x.id === document.getElementById('adminMatchSelect')?.value);
  renderAdminTypyForm(m);
}

loadState();
render();

setInterval(() => {
  // fetchLiveScores();
  render();
