// =====================================================
// GLOBAL STATE
// =====================================================
let players = ['Gracz 1', 'Gracz 2', 'Gracz 3', 'Gracz 4', 'Gracz 5'];
let typy = {};      // typy[matchId][playerName] = {home, away, x2}
let wyniki = {};    // wyniki[matchId] = {home, away, status}
let apiKey = '';
let dataLoaded = false;

// =====================================================
// FUNKCJE POMOCNICZE
// =====================================================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, (m) => {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function safeId(name) {
  return name.replace(/[^a-zA-Z0-9_-]/g, '_');
}

// =====================================================
// PUNKTACJA
// =====================================================
function calcPoints(typ, wynik) {
  if (!wynik || wynik.home === null || wynik.away === null) return null;
  if (!typ || typ.home === undefined || typ.away === undefined) return null;
  
  let base = 0;
  if (typ.home === wynik.home && typ.away === wynik.away) base = 4;
  else if ((typ.home - typ.away) === (wynik.home - wynik.away)) base = 3;
  else if ((typ.home > typ.away && wynik.home > wynik.away) ||
           (typ.home < typ.away && wynik.home < wynik.away) ||
           (typ.home === typ.away && wynik.home === wynik.away)) base = 2;
  else base = -1;
  
  return typ.x2 ? base * 2 : base;
}

function totalPoints(player, roundFilter = null) {
  let sum = 0;
  for (const m of MATCHES) {
    if (roundFilter && m.r !== roundFilter) continue;
    const p = calcPoints((typy[m.id] || {})[player], wyniki[m.id]);
    if (p !== null) sum += p;
  }
  return sum;
}

// =====================================================
// ZAPIS DO FIREBASE
// =====================================================
function saveToFirebase() {
  const dataToSave = { players, typy, wyniki, apiKey };
  set(ref(db, 'typer_data'), dataToSave)
    .then(() => {
      document.getElementById('fbBadge').className = 'badge b-ok';
      document.getElementById('fbBadge').textContent = 'Zapisano!';
      setTimeout(() => {
        if (document.getElementById('fbBadge')) {
          document.getElementById('fbBadge').className = 'badge b-ok';
          document.getElementById('fbBadge').textContent = 'Firebase OK';
        }
      }, 1500);
    })
    .catch(err => {
      console.error('Save error:', err);
      document.getElementById('fbBadge').className = 'badge b-err';
      document.getElementById('fbBadge').textContent = 'Błąd zapisu';
    });
}

// =====================================================
// RENDER MAIN PAGE
// =====================================================
function renderMain() {
  if (!dataLoaded) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px;color:var(--mut)"><span class="sp"></span> Ładowanie danych...</div>';
    return;
  }
  
  // Znajdź aktualny i następny mecz
  const now = new Date();
  let liveMatch = null;
  let nextMatch = null;
  let minDiff = Infinity;
  
  for (const m of MATCHES) {
    const matchDate = new Date(`${m.date}T${m.time}:00`);
    const matchEnd = new Date(matchDate.getTime() + 115 * 60000);
    const w = wyniki[m.id];
    
    if (w?.status === 'live') { liveMatch = m; break; }
    if (w?.status === 'ft') continue;
    if (now >= matchDate && now <= matchEnd) { liveMatch = m; break; }
    
    const diff = matchDate - now;
    if (diff > 0 && diff < minDiff) { minDiff = diff; nextMatch = m; }
  }
  
  let html = '';
  
  if (liveMatch) {
    html += renderMatchHero(liveMatch);
    html += renderTipsTable(liveMatch);
    html += renderLeaderboard();
    html += renderUpcoming(liveMatch);
  } else {
    html += renderNextMatchHero(nextMatch);
    html += renderLeaderboard();
  }
  
  document.getElementById('app').innerHTML = html;
}

function renderMatchHero(m) {
  const w = wyniki[m.id] || {};
  const hasScore = w.home !== null && w.home !== undefined;
  let badge = '';
  if (w.status === 'live') badge = `<span class="tbadge live">🔴 LIVE ${w.minute || ''}</span>`;
  else if (w.status === 'ft') badge = `<span class="tbadge">FT</span>`;
  else badge = `<span class="tbadge">${m.time} CET</span>`;
  
  return `<div class="gap">
    <div class="slabel">AKTUALNY MECZ</div>
    <div class="mhero">
      <div class="mmeta"><span class="mgrp">GRUPA ${m.g} · ${m.venue}</span>${badge}</div>
      <div class="mline">
        <div class="tblock"><div class="tflag">${F(m.hf)}</div><div class="tname">${m.hpl}</div></div>
        <div class="score">${hasScore ? `${w.home} : ${w.away}` : '– : –'}</div>
        <div class="tblock"><div class="tflag">${F(m.af)}</div><div class="tname">${m.apl}</div></div>
      </div>
    </div>
  </div>`;
}

function renderNextMatchHero(m) {
  if (!m) return `<div class="mhero" style="text-align:center"><div style="font-size:48px">🏆</div><div>Koniec turnieju!</div></div>`;
  
  const matchDate = new Date(`${m.date}T${m.time}:00`);
  const dateStr = matchDate.toLocaleDateString('pl-PL', { weekday:'long', day:'numeric', month:'long' });
  
  return `<div class="gap">
    <div class="slabel">NASTĘPNY MECZ</div>
    <div class="mhero" style="text-align:center">
      <div class="mgrp" style="margin-bottom:12px">RUNDA ${m.r} · GRUPA ${m.g} · ${m.venue}</div>
      <div class="mline">
        <div class="tblock"><div class="tflag">${F(m.hf)}</div><div class="tname">${m.hpl}</div></div>
        <div><div class="score up">${m.time} CET</div><div style="font-size:12px;color:var(--mut)">${dateStr}</div></div>
        <div class="tblock"><div class="tflag">${F(m.af)}</div><div class="tname">${m.apl}</div></div>
      </div>
    </div>
  </div>`;
}

function renderTipsTable(m) {
  const w = wyniki[m.id];
  const hasResult = w && w.home !== null;
  
  const rows = players.map(p => {
    const t = (typy[m.id] || {})[p];
    const hasTip = t && t.home !== undefined;
    const pts = hasResult && hasTip ? calcPoints(t, w) : null;
    const icon = pts === 4 ? '🟢🎉' : pts === 3 ? '🟢❕' : pts === 2 ? '🟢' : pts === -1 ? '🔴' : '';
    const ptsClass = pts === 4 ? 'p4' : pts === 3 ? 'p3' : pts === 2 ? 'p2' : pts === -1 ? 'pn' : '';
    
    return `<tr>
      <td><span class="pname">${escapeHtml(p)}</span></td>
      <td><span class="tscore">${hasTip ? `${t.home}:${t.away}${t.x2 ? '<span class="x2b">X2</span>' : ''}` : '—'}</span></td>
      <td style="text-align:center">${icon}</td>
      <td style="text-align:right">${pts !== null ? `<span class="pb ${ptsClass}">${pts > 0 ? '+' : ''}${pts}</span>` : ''}</td>
    </tr>`;
  }).join('');
  
  return `<div class="gap">
    <div class="slabel">TYPY</div>
    <div class="card"><table class="tt"><thead><tr><th>Gracz</th><th>Typ</th><th style="text-align:center">Status</th><th style="text-align:right">Pkt</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

function renderLeaderboard() {
  const scores = players.map(p => ({ name: p, pts: totalPoints(p) })).sort((a,b) => b.pts - a.pts);
  const rows = scores.map((s, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1).toString();
    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    return `<li class="lb-row"><span class="rnk ${rankClass}">${medal}</span><span class="lb-n">${escapeHtml(s.name)}</span><span class="lb-p">${s.pts}<span class="lb-pl">pkt</span></span></li>`;
  }).join('');
  
  return `<div class="gap"><div class="slabel">TABELA LIVE - ŁĄCZNIE</div><ul class="lb-list">${rows}</ul></div>`;
}

function renderUpcoming(cur) {
  const now = new Date();
  const upcoming = MATCHES.filter(m => {
    if (cur && m.id === cur.id) return false;
    if (wyniki[m.id]?.status === 'ft') return false;
    return new Date(`${m.date}T${m.time}:00`) > now;
  }).slice(0, 5);
  
  if (upcoming.length === 0) return '';
  
  const rows = upcoming.map(m => `<div class="urow"><span class="utime">${m.time}</span><div><div style="font-weight:500">${F(m.hf)} ${m.hpl} vs ${m.apl} ${F(m.af)}</div><div style="font-size:11px;color:var(--mut)">R${m.r} · Gr.${m.g} · ${m.venue}</div></div></div>`).join('');
  
  return `<div class="gap"><div class="slabel">NAJBLIŻSZE MECZE</div><div class="ulist">${rows}</div></div>`;
}

// =====================================================
// RENDER ROUND PAGE
// =====================================================
function renderRoundPage(round) {
  if (!dataLoaded) {
    document.getElementById('roundContent').innerHTML = '<div style="text-align:center;padding:40px"><span class="sp"></span> Ładowanie...</div>';
    return;
  }
  
  const roundMatches = MATCHES.filter(m => m.r === round);
  const scores = players.map(p => ({ name: p, pts: totalPoints(p, round) })).sort((a,b) => b.pts - a.pts);
  
  const lbRows = scores.map((s, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1).toString();
    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    return `<li class="lb-row"><span class="rnk ${rankClass}">${medal}</span><span class="lb-n">${escapeHtml(s.name)}</span><span class="lb-p">${s.pts}<span class="lb-pl">pkt</span></span></li>`;
  }).join('');
  
  const matchesHtml = roundMatches.map(m => {
    const w = wyniki[m.id];
    const hasScore = w && w.home !== null;
    let statusBadge = '';
    if (w?.status === 'ft') statusBadge = '<span style="font-size:11px;color:var(--grn)">FT</span>';
    else if (w?.status === 'live') statusBadge = '<span style="font-size:11px;color:var(--red)">LIVE</span>';
    else statusBadge = `<span style="font-size:11px;color:var(--mut)">${m.time}</span>`;
    
    const tipsHtml = players.map(p => {
      const t = (typy[m.id] || {})[p];
      const hasTip = t && t.home !== undefined;
      const pts = hasScore && hasTip ? calcPoints(t, w) : null;
      const icon = pts === 4 ? '🟢🎉' : pts === 3 ? '🟢❕' : pts === 2 ? '🟢' : pts === -1 ? '🔴' : (hasTip ? '⏳' : '—');
      return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd)">
        <span style="width:80px;font-weight:600">${escapeHtml(p)}</span>
        <span class="tscore">${hasTip ? `${t.home}:${t.away}${t.x2 ? ' <span class="x2b">X2</span>' : ''}` : '—'}</span>
        <span>${icon}</span>
        <span>${pts !== null ? (pts > 0 ? `+${pts}` : pts) : ''}</span>
      </div>`;
    }).join('');
    
    return `<div class="mrow" id="mr_${m.id}" onclick="toggleMrow('${m.id}')">
      <div class="mrow-header">
        <span style="width:44px;font-size:11px;color:var(--acc)">Gr.${m.g}</span>
        <span style="flex:1;font-weight:600">${F(m.hf)} ${m.hpl} – ${m.apl} ${F(m.af)}</span>
        <span style="font-size:18px;font-weight:900;min-width:36px;text-align:center">${hasScore ? `${w.home}:${w.away}` : '–'}</span>
        <span>${statusBadge}</span>
        <span style="color:var(--mut)">▼</span>
      </div>
      <div class="mrow-body">${tipsHtml}</div>
    </div>`;
  }).join('');
  
  document.getElementById('roundContent').innerHTML = `
    <div class="slabel">PUNKTACJA - RUNDA ${round}</div>
    <ul class="lb-list" style="margin-bottom:24px">${lbRows}</ul>
    <div class="slabel">MECZE (kliknij aby rozwinąć)</div>
    ${matchesHtml}
  `;
}

window.toggleMrow = function(id) {
  document.getElementById(`mr_${id}`)?.classList.toggle('open');
};

function rebuildAdmin() {
  const sel = document.getElementById('adminSel');
  if (sel && sel.options.length !== MATCHES.length) {
    sel.innerHTML = MATCHES.map(m => `<option value="${m.id}">R${m.r} ${m.hpl} vs ${m.apl}</option>`).join('');
  }
  
  const playersList = document.getElementById('playersList');
  if (playersList) {
    playersList.innerHTML = players.map((p, i) => `<div class="prow"><span class="pn">${escapeHtml(p)}</span><button class="delbtn" onclick="deletePlayer(${i})">🗑</button></div>`).join('');
  }
  
  const apiInput = document.getElementById('apiKeyInp');
  if (apiInput && apiKey) apiInput.value = apiKey;
  
  const selectedId = sel?.value;
  if (selectedId) {
    const match = MATCHES.find(m => m.id === selectedId);
    if (match) renderAdminForm(match);
  }
}

  if (!container) return;
  
  const w = wyniki[match.id] || {};
  const t = typy[match.id] || {};
  
  let html = `<div style="font-size:12px;color:var(--acc);margin-bottom:8px">${F(match.hf)} ${match.hpl} vs ${match.apl} ${F(match.af)}</div>`;
  html += `<div style="font-size:11px;color:var(--mut);margin-bottom:4px">WYNIK</div>
  <div style="display:flex;gap:5px;margin-bottom:10px">
    <input class="ainp" id="wH" value="${w.home !== undefined ? w.home : ''}" placeholder="?" style="width:45px;text-align:center">
    <span>:</span>
    <input class="ainp" id="wA" value="${w.away !== undefined ? w.away : ''}" placeholder="?" style="width:45px;text-align:center">
    <select class="asel" id="wSt" style="flex:1">
      <option value="upcoming" ${(!w.status || w.status === 'upcoming') ? 'selected' : ''}>Nadchodzący</option>
      <option value="live" ${w.status === 'live' ? 'selected' : ''}>🔴 LIVE</option>
      <option value="ft" ${w.status === 'ft' ? 'selected' : ''}>✅ FT</option>
    </select>
    <button class="abtn" style="width:auto;padding:9px 12px;margin-top:0" onclick="saveWynik('${match.id}')">💾</button>
  </div>`;
  
  html += `<div style="font-size:11px;color:var(--mut);margin-bottom:4px">TYPY GRACZY</div>`;
  for (const p of players) {
    const sid = safeId(p);
    const tip = t[p] || {};
    html += `<div style="display:flex;align-items:center;gap:4px;margin-bottom:5px">
      <span style="width:70px;font-size:12px">${escapeHtml(p)}</span>
      <input class="ainp" id="th_${sid}" value="${tip.home !== undefined ? tip.home : ''}" placeholder="D" style="width:40px;text-align:center">
      <span>:</span>
      <input class="ainp" id="ta_${sid}" value="${tip.away !== undefined ? tip.away : ''}" placeholder="G" style="width:40px;text-align:center">
      <label style="font-size:11px;display:flex;align-items:center;gap:3px"><input type="checkbox" id="tx_${sid}" ${tip.x2 ? 'checked' : ''}> X2</label>
    </div>`;
  }
  html += `<button class="abtn" onclick="saveTypy('${match.id}')">💾 Zapisz wszystkie typy</button>`;
  
  container.innerHTML = html;
}

window.saveWynik = function(matchId) {
  const h = document.getElementById('wH').value.trim();
  const a = document.getElementById('wA').value.trim();
  const st = document.getElementById('wSt').value;
  
  wyniki[matchId] = {
    home: (h !== '' && !isNaN(parseInt(h))) ? parseInt(h) : null,
    away: (a !== '' && !isNaN(parseInt(a))) ? parseInt(a) : null,
    status: st,
    minute: null
  };
  saveToFirebase();
  renderMain();
  const btn = event?.target;
  if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1000); }
};

window.saveTypy = function(matchId) {
  if (!typy[matchId]) typy[matchId] = {};
  
  for (const p of players) {
    const sid = safeId(p);
    const h = document.getElementById(`th_${sid}`)?.value.trim();
    const a = document.getElementById(`ta_${sid}`)?.value.trim();
    const x = document.getElementById(`tx_${sid}`)?.checked || false;
    
    if (h !== '' && a !== '' && !isNaN(parseInt(h)) && !isNaN(parseInt(a))) {
      typy[matchId][p] = { home: parseInt(h), away: parseInt(a), x2: x };
    }
  }
  saveToFirebase();
  renderMain();
  const btn = event?.target;
  if (btn) { btn.textContent = '✅ Zapisano!'; setTimeout(() => { btn.textContent = '💾 Zapisz wszystkie typy'; }, 1500); }
};

window.addPlayer = function() {
  const name = document.getElementById('newPlayer').value.trim();
  if (!name || players.includes(name)) return;
  players.push(name);
  document.getElementById('newPlayer').value = '';
  saveToFirebase();
  rebuildAdmin();
  renderMain();
};

window.deletePlayer = function(index) {
  if (!confirm(`Usunąć ${players[index]}?`)) return;
  players.splice(index, 1);
  saveToFirebase();
  rebuildAdmin();
  renderMain();
};

window.saveApiKeyOnly = function() {
  const key = document.getElementById('apiKeyInp').value.trim();
  if (key) {
    apiKey = key;
    saveToFirebase();
    document.getElementById('apiBadge').className = 'badge b-ok';
    document.getElementById('apiBadge').textContent = 'Klucz zapisany';
  }
};

window.onMatchChange = function() {
  const id = document.getElementById('adminSel').value;
  const match = MATCHES.find(m => m.id === id);
  if (match) renderAdminForm(match);
};

window.toggleAdmin = function() {
  document.getElementById('adminPanel').classList.toggle('on');
  if (document.getElementById('adminPanel').classList.contains('on')) {
    rebuildAdmin();
  }
};

window.goRound = function(r) {
  document.getElementById('pageMain').classList.remove('on');
  document.getElementById('pageRound').classList.add('on');
  renderRoundPage(r);
};

window.goMain = function() {
  document.getElementById('pageRound').classList.remove('on');
  document.getElementById('pageMain').classList.add('on');
  renderMain();
};

// =====================================================
// INIT - ŁADOWANIE Z FIREBASE
// =====================================================
const dataRef = ref(db, 'typer_data');
onValue(dataRef, (snapshot) => {
  const data = snapshot.val();
  
  if (data && typeof data === 'object') {
    if (data.players && Array.isArray(data.players)) players = data.players;
    if (data.typy && typeof data.typy === 'object') typy = data.typy;
    if (data.wyniki && typeof data.wyniki === 'object') wyniki = data.wyniki;
    if (data.apiKey) apiKey = data.apiKey;
  }
  
  dataLoaded = true;
  document.getElementById('fbBadge').className = 'badge b-ok';
  document.getElementById('fbBadge').textContent = 'Firebase OK';
  
  if (apiKey) {
    document.getElementById('apiBadge').className = 'badge b-ok';
    document.getElementById('apiBadge').textContent = 'API OK';
  }
  
  renderMain();
  rebuildAdmin();
}, (error) => {
  console.error('Firebase error:', error);
  document.getElementById('fbBadge').className = 'badge b-err';
  document.getElementById('fbBadge').textContent = 'Błąd';
  dataLoaded = true;
  renderMain();
});

// Dodajemy style dla .mrow
const style = document.createElement('style');
style.textContent = `.mrow-body{display:none;padding-top:10px;padding-left:50px}.mrow.open .mrow-body{display:block}.mrow{cursor:pointer}`;
document.head.appendChild(style);
</script>
</body>
